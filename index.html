<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <title>梅花易数</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

    <!-- ========== 首页 ========== -->
    <div id="home" class="page active">
        <div class="header">
            <h1>梅花易数</h1>
            <p class="subtitle">万物皆有数，一卦知吉凶</p>
        </div>

        <!-- 先天取卦（第一行） -->
        <div class="card">
            <label class="method-group-label">先天取卦</label>
            <div class="method-grid">
                <button class="method-btn" data-method="number">数字起卦</button>
                <button class="method-btn" data-method="time">时间起卦</button>
                <button class="method-btn" data-method="text">字数起卦</button>
                <button class="method-btn" data-method="sound">声音起卦</button>
                <button class="method-btn" data-method="stroke">字画起卦</button>
            </div>
        </div>

        <!-- 后天取卦（第二行） -->
        <div class="card">
            <label class="method-group-label">后天取卦</label>
            <div class="method-grid">
                <button class="method-btn" data-method="color">颜色起卦</button>
                <button class="method-btn" data-method="person">人物起卦</button>
                <button class="method-btn" data-method="fangwei">方位起卦</button>
            </div>
        </div>

        <!-- 占法原文提示 -->
        <div class="card method-quote" id="method-quote" style="display:none">
            <div class="quote-label">📖 占法原文</div>
            <p id="quote-text" class="quote-text"></p>
        </div>

        <!-- 数字起卦 -->
        <div class="card input-card" id="input-number" style="display:none">
            <label>输入数字（逗号分隔）</label>
            <input type="text" id="num-input" placeholder="如：3,7 或 3,7,2" inputmode="numeric">
            <p class="hint">3个数：上卦·下卦·动爻<br>2个数：上卦·下卦（动爻自动）<br>1个数：自动推算</p>
        </div>

        <!-- 时间起卦 -->
        <div class="card input-card" id="input-time" style="display:none">
            <label>选择时间</label>
            <input type="datetime-local" id="time-input">
            <p class="hint">留空则用当前时间</p>
        </div>

        <!-- 字数起卦 -->
        <div class="card input-card" id="input-text" style="display:none">
            <label>输入文字内容</label>
            <textarea id="text-input" placeholder="如：今日天气晴朗" rows="3"></textarea>
            <p class="hint">按总字数起卦，字数÷8取余为上卦</p>
        </div>

        <!-- 声音起卦 -->
        <div class="card input-card" id="input-sound" style="display:none">
            <label>声音次数</label>
            <input type="number" id="sound-input" placeholder="如：听到敲门3声，输入3" min="1" inputmode="numeric">
            <p class="hint">以声音次数为上卦，加时数为下卦</p>
        </div>

        <!-- 字画起卦 -->
        <div class="card input-card" id="input-stroke" style="display:none">
            <label>笔画数</label>
            <input type="number" id="stroke-input" placeholder="如：林字8画，输入8" min="1" inputmode="numeric">
            <p class="hint">以笔画数为上卦，加时数为下卦</p>
        </div>

        <!-- 颜色起卦 -->
        <div class="card input-card" id="input-color" style="display:none">
            <label>选择所见颜色</label>
            <div class="color-grid">
                <button class="color-btn color-zi" data-color="青">青</button>
                <button class="color-btn color-lv" data-color="绿">绿</button>
                <button class="color-btn color-chi" data-color="赤">赤</button>
                <button class="color-btn color-hei" data-color="黑">黑</button>
                <button class="color-btn color-yangbai" data-color="阳白">阳白</button>
                <button class="color-btn color-yinbai" data-color="阴白">阴白</button>
                <button class="color-btn color-yanghuang" data-color="阳黄">阳黄</button>
                <button class="color-btn color-yinhuang" data-color="阴黄">阴黄</button>
                <button class="color-btn color-yanglan" data-color="阳蓝">阳蓝</button>
                <button class="color-btn color-yinlan" data-color="阴蓝">阴蓝</button>
            </div>
            <div id="color-phrase" class="color-phrase" style="display:none">
                <p id="color-phrase-text"></p>
            </div>
        </div>

        <!-- 人物起卦 -->
        <div class="card input-card" id="input-person" style="display:none">
            <label>选择人物类型</label>
            <select id="person-select">
                <option value="父">父（老男）</option>
                <option value="母">母（老妇）</option>
                <option value="长男">长男</option>
                <option value="长女">长女</option>
                <option value="中男">中男</option>
                <option value="中女">中女</option>
                <option value="少男">少男</option>
                <option value="少女">少女</option>
            </select>
            <label>方位（可选）</label>
            <select id="person-fangwei">
                <option value="">不指定</option>
                <option value="东">东</option>
                <option value="东南">东南</option>
                <option value="南">南</option>
                <option value="西南">西南</option>
                <option value="西">西</option>
                <option value="西北">西北</option>
                <option value="北">北</option>
                <option value="东北">东北</option>
            </select>
        </div>

        <!-- 方位起卦 -->
        <div class="card input-card" id="input-fangwei" style="display:none">
            <label>选择方位</label>
            <select id="fangwei-select">
                <option value="东">东</option>
                <option value="东南">东南</option>
                <option value="南">南</option>
                <option value="西南">西南</option>
                <option value="西">西</option>
                <option value="西北">西北</option>
                <option value="北">北</option>
                <option value="东北">东北</option>
            </select>
            <label>物数（可选，留空用时辰）</label>
            <input type="number" id="wushu-input" placeholder="如：3" min="1">
        </div>

        <div class="card">
            <label>问事类型</label>
            <div class="question-grid">
                <button class="q-btn active" data-q="通用">通用</button>
                <button class="q-btn" data-q="财运">财运</button>
                <button class="q-btn" data-q="事业">事业</button>
                <button class="q-btn" data-q="婚姻">婚姻</button>
                <button class="q-btn" data-q="健康">健康</button>
                <button class="q-btn" data-q="考试">考试</button>
                <button class="q-btn" data-q="投资">投资</button>
                <button class="q-btn" data-q="出行">出行</button>
                <button class="q-btn" data-q="诉讼">诉讼</button>
                <button class="q-btn" data-q="失物">失物</button>
            </div>
        </div>

        <div class="card">
            <label>动态外应（所见所闻）</label>
            <input type="text" id="waiying-input" placeholder="如：风吹落叶（留空跳过）">
            <p class="hint">输入当下所见所闻，自动匹配八卦万物类象</p>
        </div>

        <button id="divine-btn" class="primary-btn">起 卦</button>
    </div>

    <!-- ========== 结果页 ========== -->
    <div id="result" class="page">
        <div id="result-content"></div>
        <button id="back-btn" class="primary-btn">重新起卦</button>
    </div>

</div>

<script src="data.js"></script>
<script src="lunar_data.js"></script>
<script src="app.js"></script>
<script src="ui.js"></script>
</body>
</html>
